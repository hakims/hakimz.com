<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research — Ali Hakimi</title>
<meta name="description" content="Full manuscript reader — Ali Hakimi's vascular surgery research.">
<meta name="theme-color" content="#05060d">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="research-assets/app.css">
<style>
  /* ============================================================
     hakimz.com top nav — replicated from hakimz.com/assets/styles.css
     so this page wears the site's own header (NOT the Alfred top bar).
     Scoped to the nav only, to avoid clashing with research app.css.
     ============================================================ */
  :root{
    --hz-bg:#04050b; --hz-ink:#eef1fb; --hz-ink-soft:#aeb6cc; --hz-muted:#6b758f;
    --hz-line:rgba(255,255,255,.07); --hz-line-2:rgba(255,255,255,.13);
    --hz-cyan:#7fd6ec; --hz-violet:#9b8cf8;
    --hz-ease:cubic-bezier(.4,0,.2,1); --hz-maxw:1100px;
    --hz-font-display:"Space Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    --hz-font-body:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  body{font-family:var(--hz-font-body)}
  .topnav{
    position:fixed;top:0;left:0;right:0;z-index:50;
    border-bottom:1px solid transparent;
    transition:background .3s var(--hz-ease),border-color .3s var(--hz-ease),backdrop-filter .3s var(--hz-ease);
  }
  .topnav.scrolled{
    background:rgba(6,9,20,.62);
    -webkit-backdrop-filter:blur(14px) saturate(140%);backdrop-filter:blur(14px) saturate(140%);
    border-bottom:1px solid var(--hz-line);
  }
  .nav-wrap{
    max-width:var(--hz-maxw);margin:0 auto;
    padding:13px clamp(20px,5vw,40px);
    display:flex;align-items:center;justify-content:space-between;gap:20px;
  }
  .brand{
    font-family:var(--hz-font-display);font-weight:700;font-size:20px;letter-spacing:-.02em;
    background:linear-gradient(180deg,#fff,#bcc6e2);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-decoration:none;
  }
  .nav-links{display:flex;align-items:center;gap:26px}
  .nav-links a{
    position:relative;text-decoration:none;
    font-family:var(--hz-font-display);font-size:14px;font-weight:500;letter-spacing:.01em;
    color:var(--hz-ink-soft);transition:color .2s var(--hz-ease);
  }
  .nav-links a:hover,.nav-links a.current{color:var(--hz-ink)}
  .nav-links a::after{
    content:"";position:absolute;left:0;right:0;bottom:-6px;height:1.5px;border-radius:2px;
    background:linear-gradient(90deg,var(--hz-cyan),var(--hz-violet));
    transform:scaleX(0);transform-origin:left;transition:transform .25s var(--hz-ease);
  }
  .nav-links a:hover::after,.nav-links a.current::after{transform:scaleX(1)}
  .nav-toggle{display:none}

  /* push the manuscript main below the fixed nav */
  main.main{padding-top:84px}

  /* ---- hakimz-style footer ---- */
  .hz-footer{padding:40px 0;border-top:1px solid var(--hz-line);background:rgba(4,5,11,.5);position:relative;z-index:1;margin-top:40px}
  .hz-footer-wrap{max-width:var(--hz-maxw);margin:0 auto;padding:0 clamp(20px,5vw,40px);display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .hz-footer-mark{font-family:var(--hz-font-display);font-weight:700;font-size:18px;letter-spacing:-.01em;color:var(--hz-ink)}
  .hz-footer-links{display:flex;gap:18px;margin-left:auto;flex-wrap:wrap}
  .hz-footer-links a{font-size:14px;color:var(--hz-ink-soft);transition:color .2s var(--hz-ease);text-decoration:none}
  .hz-footer-links a:hover{color:var(--hz-cyan)}
  .hz-footer-fine{flex-basis:100%;font-size:12.5px;color:var(--hz-muted)}

  @media (max-width:680px){
    .nav-toggle{
      display:flex;flex-direction:column;justify-content:center;gap:5px;
      width:44px;height:44px;padding:0 11px;z-index:60;cursor:pointer;
      border:1px solid var(--hz-line-2);border-radius:12px;background:rgba(255,255,255,.05);
    }
    .nav-toggle span{display:block;width:100%;height:2px;border-radius:2px;background:var(--hz-ink);
      transition:transform .3s var(--hz-ease),opacity .2s var(--hz-ease)}
    .nav-toggle[aria-expanded="true"] span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .nav-toggle[aria-expanded="true"] span:nth-child(2){opacity:0}
    .nav-toggle[aria-expanded="true"] span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    .nav-links{
      position:fixed;inset:0;z-index:55;gap:34px;
      flex-direction:column;justify-content:center;align-items:center;
      background:rgba(4,6,14,.9);
      -webkit-backdrop-filter:blur(22px);backdrop-filter:blur(22px);
      opacity:0;visibility:hidden;transform:scale(1.05);
      transition:opacity .3s var(--hz-ease),transform .3s var(--hz-ease),visibility .3s;
    }
    .nav-links.open{opacity:1;visibility:visible;transform:none}
    .nav-links a{font-size:24px}
    .nav-links a::after{display:none}
    .hz-footer-links{margin-left:0;flex-basis:100%}
  }
</style>
</head>
<body>

<!-- global starfield background (Alfred hub.js initSky animates this canvas) -->
<canvas class="sky-bg" id="sky" aria-hidden="true"></canvas>

<!-- ============ hakimz.com TOP NAV (NOT the Alfred top bar) ============ -->
<nav class="topnav" id="nav" aria-label="Primary">
  <div class="nav-wrap">
    <a class="brand" href="index.html">Hakimz</a>
    <button class="nav-toggle" id="navToggle" aria-label="Open menu" aria-expanded="false" aria-controls="navMenu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="navMenu">
      <a href="index.html#tinkering">Tinkering</a>
      <a href="index.html#signals">Currently into</a>
      <a href="research.html" class="current">Research</a>
      <a href="https://alfred.hakimz.com" target="_blank" rel="noopener">Alfred ↗</a>
    </div>
  </div>
</nav>

<main class="main">
  <a class="backlink" href="research.html">‹ Research</a>
  <div id="doc"><div class="empty">Loading…</div></div>
</main>

<!-- ============ hakimz-style FOOTER ============ -->
<footer class="hz-footer">
  <div class="hz-footer-wrap">
    <span class="hz-footer-mark">Hakimz</span>
    <nav class="hz-footer-links" aria-label="Elsewhere">
      <a href="index.html">Home</a>
      <a href="research.html">Research</a>
      <a href="https://alfred.hakimz.com" target="_blank" rel="noopener">Alfred ↗</a>
    </nav>
    <span class="hz-footer-fine">Built late at night · <span id="year"></span></span>
  </div>
</footer>

<!-- hub.js gives us: starfield (initSky), lightbox, Hub.fetchData + Hub.esc -->
<script src="research-assets/hub.js"></script>
<script src="research-assets/research.js"></script>
<script>
/* hakimz-style nav behavior (frost on scroll + mobile hamburger overlay).
   We do NOT load hakimz main.js — that would inject a second starfield. */
(function(){
  var yr=document.getElementById('year'); if(yr) yr.textContent=new Date().getFullYear();
  var nav=document.getElementById('nav');
  if(nav){
    var onScroll=function(){ nav.classList.toggle('scrolled', window.scrollY>24); };
    onScroll(); window.addEventListener('scroll', onScroll, {passive:true});
    var navToggle=document.getElementById('navToggle');
    var navMenu=document.getElementById('navMenu');
    if(navToggle && navMenu){
      var setOpen=function(open){
        navMenu.classList.toggle('open', open);
        navToggle.setAttribute('aria-expanded', open?'true':'false');
        navToggle.setAttribute('aria-label', open?'Close menu':'Open menu');
      };
      navToggle.addEventListener('click', function(){ setOpen(!navMenu.classList.contains('open')); });
      navMenu.querySelectorAll('a').forEach(function(a){ a.addEventListener('click', function(){ setOpen(false); }); });
    }
  }
})();
</script>
<script>
/* READ-ONLY full-manuscript reader (copied v1) — ported from Alfred project.html.
   Differences vs Alfred: reads from research-assets/data/, no "Refresh from Drive"
   button, back-link to research.html. Figures/poster resolve via the rewritten
   research-assets/... paths; lightbox is delegated globally by hub.js. */
(async function(){
  const $=s=>document.querySelector(s);
  const id=new URLSearchParams(location.search).get('id');
  if(!id){$('#doc').innerHTML='<div class="empty">No project specified.</div>';return;}
  const ALLOWED=['billing-coding','tcar-segmentation','tcar-acap','readability-scores'];
  if(!ALLOWED.includes(id)){$('#doc').innerHTML='<div class="empty">Unknown manuscript.</div>';return;}

  const m=await Hub.fetchData('research-assets/data/'+id+'.json');
  if(!m){$('#doc').innerHTML='<div class="empty">Could not load this manuscript.</div>';return;}
  document.title=(m.short_title||m.title||'Research')+' — Ali Hakimi';

  const link=m.links||{};
  const primaryHref=link.published||link.manuscript||'#';
  const primaryLabel=link.published?'Read published version ↗':'Open manuscript (Drive) ↗';
  const chips=[m.stage].filter(Boolean).map(c=>'<span class="chip">'+Hub.esc(c)+'</span>').join('');

  // Collapsible section helper — number/label headings stay clickable; TOC links open them.
  const toc=[];
  function sec(sid,title,inner,open){
    toc.push([sid,title]);
    return '<details class="msec"'+(open===false?'':' open')+' id="'+Hub.esc(sid)+'">'+
      '<summary><span class="car">›</span><span class="sech-h">'+Hub.esc(title)+'</span></summary>'+
      '<div class="secbody">'+inner+'</div></details>';
  }

  let body='';
  // Abstract
  const a=m.abstract||{};
  body+=sec('abstract','Abstract','<div class="ms-abstract">'+
    Object.keys(a).map(k=>'<div class="ab"><b>'+Hub.esc(k)+'</b><p>'+Hub.esc(a[k])+'</p></div>').join('')+'</div>');
  // Takeaways
  if((m.takeaways||[]).length)
    body+=sec('takeaways','Key takeaways','<ul class="hiyield" style="min-height:0">'+m.takeaways.map(t=>'<li>'+Hub.esc(t)+'</li>').join('')+'</ul>');
  // Sections (tables + figures fold into Results)
  (m.sections||[]).forEach(s=>{
    let inner='';
    if(s.paras) inner+=Research.paras(s.paras);
    if(s.subsections) s.subsections.forEach(ss=>{ inner+='<h3 class="subh">'+Hub.esc(ss.h)+'</h3>'+Research.paras(ss.paras); });
    if(s.id==='results'){
      inner+='<h3 class="subh">Tables</h3>'+Research.tablesBlock(m.tables);
      inner+='<h3 class="subh">Figures</h3>'+(m.figures||[]).map(Research.figBlock).join('');
    }
    body+=sec(s.id,s.title,inner);
  });
  // References — full numbered list
  if((m.references||[]).length)
    body+=sec('refs','References ('+m.references.length+')','<ol class="refs">'+m.references.map(r=>'<li>'+Hub.esc(r)+'</li>').join('')+'</ol>',false);

  $('#doc').innerHTML=
    '<header class="ms-hero">'+
      '<h1>'+Hub.esc(m.title)+'</h1>'+
      '<p class="ms-authors">'+Hub.esc(m.authors||'')+'</p>'+
      '<p class="ms-affil">'+Hub.esc(m.affiliations||'')+'</p>'+
      '<div class="ms-chips">'+chips+'</div>'+
      '<div class="ms-links">'+
        '<a class="btn primary" href="'+Hub.esc(primaryHref)+'" target="_blank" rel="noopener">'+primaryLabel+'</a>'+
        (link.code?'<a class="btn" href="'+Hub.esc(link.code)+'" target="_blank" rel="noopener">Code ↗</a>':'')+
      '</div>'+
    '</header>'+
    '<nav class="toc">'+toc.map(t=>'<a href="#'+Hub.esc(t[0])+'">'+Hub.esc(t[1])+'</a>').join('')+'</nav>'+
    '<article class="ms">'+body+'</article>';

  // TOC click: make sure the target section is expanded before scrolling.
  document.querySelectorAll('.toc a').forEach(lk=>lk.addEventListener('click',()=>{
    const t=document.getElementById(lk.getAttribute('href').slice(1)); if(t&&t.tagName==='DETAILS') t.open=true;
  }));
})();
</script>
</body>
</html>
